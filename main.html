<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>RayNeo Inventory System - Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #03c75a; --secondary: #2c3e50; --border: #e1e4e8; --bg: #f8f9fa; --accent: #3498db; --point: #e67e22; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .backup-group { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px; }
        .btn-backup { background: #636e72; color: white; padding: 8px 12px; font-size: 12px; border-radius: 6px; border:none; cursor:pointer; }

        .main-layout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; align-items: start; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid var(--border); }
        h3 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; font-size: 1.1rem; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 12px; margin-top: 5px; }
        .btn-excel-dl { background: #2ecc71; color: white; width: 100%; padding: 12px; margin-top: 10px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid var(--border); padding: 10px 8px; text-align: center; }
        th { background: #f4f6f8; font-size: 13px; color: #555; }
        td { font-size: 14px; }
        .summary { margin-top: 15px; padding: 20px; background: var(--secondary); color: white; border-radius: 8px; text-align: right; font-size: 1.4rem; font-weight: bold; }

        .check-area { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 5px 10px; margin-bottom: 10px; border-radius: 6px; background: #fafafa; }
        .chk-item { padding: 10px 5px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 14px; cursor: pointer; }
        .chk-item:hover { background: #f1f1f1; }
        .chk-item input { width: auto; margin: 0; }

        .history-list { max-height: 400px; overflow-y: auto; font-size: 13px; }
        .history-day { margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .history-date { font-weight: bold; color: var(--secondary); margin-bottom: 5px; background: #eee; padding: 4px; border-radius: 4px; }

        .split-box { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #ddd; }
        #modalOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; }
        .modal-content { position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:12px; width:90%; max-width:650px; }
    </style>
</head>
<body>

<div class="container">
    <div class="backup-group">
        <button class="btn-backup" onclick="exportData()">💾 시스템 백업 저장</button>
        <button class="btn-backup" onclick="document.getElementById('importFile').click()">📂 백업 불러오기</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="card">
                <h3>4. 실시간 재고 및 매출 현황</h3>
                <table>
                    <thead>
                        <tr><th>품목명</th><th>단가</th><th>기초</th><th>판매</th><th>재고</th><th>매출액</th><th>관리</th></tr>
                    </thead>
                    <tbody id="mainTable"></tbody>
                </table>
                <div class="summary">
                    <span style="font-size: 0.9rem; font-weight: normal; opacity: 0.8;">누적 매출 합계:</span><br>
                    <span id="totalSales">0</span>원
                </div>
                <button class="btn btn-excel-dl" onclick="downloadCurrentStatus()">📊 현재 현황 엑셀 다운로드 (.xlsx)</button>
            </div>

            <div class="card">
                <h3>1. 신규 품목 등록</h3>
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; align-items: end;">
                    <div><label>품목명</label><input type="text" id="mName" placeholder="관리용 이름"></div>
                    <div><label>판매가 (원)</label><input type="number" id="mPrice" value="0"></div>
                    <div><label>기초 재고</label><input type="number" id="mQty" value="0"></div>
                </div>
                <button class="btn btn-main" onclick="addItem()">품목 리스트 추가</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="card">
                <h3>3. 판매 데이터 적용</h3>
                <div style="margin-bottom: 5px;"><label style="font-size: 13px; font-weight: bold; color: var(--point);">[개별 판매 직접 입력]</label></div>
                <div class="split-box">
                    <div style="flex: 2;"><select id="directItemSelect"></select></div>
                    <div style="flex: 1;"><input type="number" id="directQty" value="1" min="1"></div>
                    <div style="flex: 1.5;"><button class="btn" style="background:var(--point); color:white; width:100%; height:40px; margin-bottom:15px;" onclick="applyDirectSale()">즉시 반영</button></div>
                </div>
                <div style="margin-top: 10px;"><label style="font-size: 13px; font-weight: bold; color: var(--secondary);">[엑셀 파일 일괄 적용]</label></div>
                <div style="display: flex; gap: 10px; align-items: flex-end;">
                    <div style="flex: 3;"><input type="file" id="exFile" accept=".xlsx, .xls"></div>
                    <div style="flex: 1.5;"><button class="btn" style="background:var(--secondary); color:white; width:100%; height:40px; margin-bottom:15px;" onclick="loadExcel()">반영하기</button></div>
                </div>
            </div>

            <div class="card">
                <h3>2. 플랫폼 상품 매칭 설정</h3>
                <label>엑셀 상품명 (전체 복사)</label><input type="text" id="exName" placeholder="엑셀 상품명 그대로 복사">
                <label>연결할 품목 선택</label>
                <div id="itemChecks" class="check-area"></div>
                <button class="btn btn-main" style="background: var(--accent);" onclick="addMap()">매칭 규칙 저장</button>
                <button class="btn" style="width:100%; margin-top:8px; background:#636e72; color:white;" onclick="openMapModal()">📋 매칭 규칙 확인/삭제</button>
            </div>

            <div class="card">
                <h3>5. 날짜별 판매 기록</h3>
                <div id="historyContainer" class="history-list">
                    <p style="color:#999; text-align:center; padding:20px;">판매 기록이 없습니다.</p>
                </div>
                <button class="btn" style="width:100%; margin-top:10px; background:#e74c3c; color:white;" onclick="clearHistory()">기록 전체 초기화</button>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay"><div class="modal-content"><h3>매칭 규칙 내역</h3><span style="float:right; cursor:pointer;" onclick="closeMapModal()">[닫기]</span><table><thead><tr><th>엑셀 상품명</th><th>연결 품목</th><th>삭제</th></tr></thead><tbody id="modalTableBody"></tbody></table></div></div>

<script>
    let db_master = JSON.parse(localStorage.getItem('rn_rb_master')) || [];
    let db_map = JSON.parse(localStorage.getItem('rn_rb_map')) || [];
    let db_history = JSON.parse(localStorage.getItem('rn_rb_history')) || [];

    // 날짜 포맷 함수
    function getToday() { return new Date().toISOString().slice(0, 10); }

    // 기록 추가 함수
    function addHistory(itemName, qty) {
        const date = getToday();
        const existing = db_history.find(h => h.date === date && h.name === itemName);
        if(existing) { existing.qty += qty; } 
        else { db_history.push({ date, name: itemName, qty }); }
    }

    function applyDirectSale() {
        const itemName = document.getElementById('directItemSelect').value;
        const qty = parseInt(document.getElementById('directQty').value) || 0;
        if(!itemName || qty <= 0) return alert("품목과 수량을 확인하세요.");
        const item = db_master.find(i => i.name === itemName);
        if(item) { 
            item.sold += qty; 
            addHistory(itemName, qty);
            save(); 
            alert(`[${itemName}] ${qty}건 반영 완료`); 
        }
    }

    function loadExcel() {
        const file = document.getElementById('exFile').files[0];
        if(!file) return alert("파일 선택!");
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                let count = 0;
                rows.forEach(row => {
                    const title = row['상품명'] || row['등록상품명'] || row['주문상품명'] || row['노출상품명'];
                    const qty = parseInt(row['수량'] || row['구매수량'] || row['주문수량'] || row['구매수(수량)']) || 1;
                    if(title) {
                        const rule = db_map.find(m => m.exName.trim() === title.trim());
                        if(rule) { 
                            rule.targets.forEach(tName => { 
                                const item = db_master.find(i => i.name === tName); 
                                if(item) { 
                                    item.sold += qty; 
                                    addHistory(tName, qty);
                                    count++; 
                                } 
                            }); 
                        }
                    }
                });
                save(); alert(count + "건 일괄 반영 완료!");
            } catch(err) { alert("엑셀 분석 오류!"); }
        };
        reader.readAsArrayBuffer(file);
    }

    function addItem() {
        const name = document.getElementById('mName').value.trim();
        const price = parseInt(document.getElementById('mPrice').value) || 0;
        const qty = parseInt(document.getElementById('mQty').value) || 0;
        if(!name) return;
        db_master.push({ name, price, initial: qty, sold: 0 });
        save();
        document.getElementById('mName').value = "";
    }

    function downloadCurrentStatus() {
        const data = db_master.map(item => ({ "품목명": item.name, "단가": item.price, "기초재고": item.initial, "누적판매": item.sold, "현재재고": item.initial - item.sold, "누적매출": item.sold * item.price }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "현황");
        const today = getToday();
        XLSX.writeFile(wb, `SKY Commerce_재고현황_${today}.xlsx`);
    }

    function clearHistory() { if(confirm("모든 날짜별 판매 기록을 삭제할까요? (재고 수치는 유지됩니다)")) { db_history = []; save(); } }
    function stockIn(idx) { const val = prompt("입고 수량:"); if(val) { db_master[idx].initial += parseInt(val); save(); } }
    function editItem(idx) { const val = prompt("현재 실재고 입력 (누적판매는 0으로 리셋):"); if(val !== null) { db_master[idx].initial = parseInt(val); db_master[idx].sold = 0; save(); } }
    function delItem(idx) { if(confirm("품목을 삭제하시겠습니까?")) { db_master.splice(idx, 1); save(); } }
    function openMapModal() { const tbody = document.getElementById('modalTableBody'); tbody.innerHTML = ""; db_map.forEach((m, idx) => { tbody.innerHTML += `<tr><td>${m.exName}</td><td>${m.targets.join(', ')}</td><td><button onclick="delMap(${idx})">삭제</button></td></tr>`; }); document.getElementById('modalOverlay').style.display = 'block'; }
    function closeMapModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function delMap(idx) { db_map.splice(idx, 1); openMapModal(); save(); }
    function exportData() { 
    const blob = new Blob([JSON.stringify({ master: db_master, map: db_map, history: db_history })], {type: "application/json"}); 
    const a = document.createElement('a'); 
    a.href = URL.createObjectURL(blob); 
    
    // 이 부분을 수정: 날짜와 시간을 포함 (예: SKY_백업_2024-05-22.json)
    const today = new Date().toISOString().slice(0, 10);
    a.download = `SKY_Commerce_백업_${today}.json`; 
    
    a.click(); 
}
    function importData(e) { const reader = new FileReader(); reader.onload = (event) => { const data = JSON.parse(event.target.result); db_master = data.master; db_map = data.map; db_history = data.history || []; save(); alert("데이터 복구 완료"); }; reader.readAsText(e.target.files[0]); }

    function addMap() {
        const exName = document.getElementById('exName').value.trim();
        const targets = Array.from(document.querySelectorAll('.chk:checked')).map(c => c.value);
        if(!exName || targets.length === 0) return alert("매칭 정보 부족");
        db_map.push({ exName, targets });
        save();
        document.getElementById('exName').value = "";
    }

    function save() {
        localStorage.setItem('rn_rb_master', JSON.stringify(db_master));
        localStorage.setItem('rn_rb_map', JSON.stringify(db_map));
        localStorage.setItem('rn_rb_history', JSON.stringify(db_history));
        render();
    }

    function render() {
        const table = document.getElementById('mainTable');
        const checks = document.getElementById('itemChecks');
        const directSelect = document.getElementById('directItemSelect');
        const historyList = document.getElementById('historyContainer');
        let total = 0;

        // 메인 테이블 & 드롭다운
        table.innerHTML = "";
        directSelect.innerHTML = `<option value="">-- 품목 선택 --</option>`;
        db_master.forEach((item, idx) => {
            const current = item.initial - item.sold;
            const sales = item.sold * item.price;
            total += sales;
            table.innerHTML += `<tr><td style="text-align:left"><strong>${item.name}</strong></td><td>${item.price.toLocaleString()}</td><td>${item.initial}</td><td>${item.sold}</td><td style="font-weight:bold; color:${current < 10 ? '#e74c3c':'#2c3e50'}">${current}</td><td style="color:var(--accent); font-weight:bold;">${sales.toLocaleString()}</td><td><button class="btn" style="background:#2980b9; color:white; padding:4px 8px; font-size:11px;" onclick="stockIn(${idx})">입고</button> <button class="btn" style="background:#f39c12; color:white; padding:4px 8px; font-size:11px;" onclick="editItem(${idx})">수정</button> <button class="btn" style="background:#e74c3c; color:white; padding:4px 8px; font-size:11px;" onclick="delItem(${idx})">삭제</button></td></tr>`;
            directSelect.innerHTML += `<option value="${item.name}">${item.name}</option>`;
        });
        document.getElementById('totalSales').innerText = total.toLocaleString();

        // 매칭 체크박스
        checks.innerHTML = "";
        db_master.forEach(item => { checks.innerHTML += `<label class="chk-item" for="c_${item.name}"><span>${item.name}</span><input type="checkbox" class="chk" value="${item.name}" id="c_${item.name}"></label>`; });

        // 5. 날짜별 판매량 렌더링
        if(db_history.length === 0) {
            historyList.innerHTML = `<p style="color:#999; text-align:center; padding:20px;">판매 기록이 없습니다.</p>`;
        } else {
            const grouped = db_history.reduce((acc, obj) => {
                acc[obj.date] = acc[obj.date] || [];
                acc[obj.date].push(obj);
                return acc;
            }, {});
            
            let historyHTML = "";
            const sortedDates = Object.keys(grouped).sort().reverse(); // 최근 날짜가 위로
            sortedDates.forEach(date => {
                historyHTML += `<div class="history-day"><div class="history-date">${date}</div>`;
                grouped[date].forEach(item => {
                    historyHTML += `<div style="display:flex; justify-content:space-between; padding:2px 5px;"><span>${item.name}</span><b>${item.qty}개</b></div>`;
                });
                historyHTML += `</div>`;
            });
            historyList.innerHTML = historyHTML;
        }
    }
    render();
</script>
</body>
</html>

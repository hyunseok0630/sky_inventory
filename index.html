<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SKY Commerce - Smart Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #03c75a; --secondary: #2c3e50; --border: #e1e4e8; --bg: #f8f9fa; --accent: #3498db; --point: #e67e22; --danger: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        #loadingOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; text-align:center; padding-top:20%; font-weight:bold; color:var(--primary); font-size: 1.2rem; }
        
        .backup-group { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px; }
        .btn-backup { background: #636e72; color: white; padding: 8px 12px; font-size: 12px; border-radius: 6px; border:none; cursor:pointer; }
        
        .main-layout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; align-items: start; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid var(--border); }
        h3 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; font-size: 1.1rem; color: var(--secondary); }
        
        /* 4. 실시간 현황 테이블 */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; background: white; }
        th, td { border: 1px solid var(--border); padding: 12px 8px; text-align: center; }
        th { background: #f4f6f8; font-size: 13px; color: #555; position: sticky; top: 0; }
        
        /* 당일 매출 합계 영역 */
        .summary { margin-top: 15px; padding: 20px; background: var(--secondary); color: white; border-radius: 8px; text-align: right; font-size: 1.4rem; font-weight: bold; }
        
        /* 5. 전체 판매 히스토리 스타일 */
        .history-list { max-height: 400px; overflow-y: auto; font-size: 13px; }
        .history-day { margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .history-date { font-weight: bold; color: var(--secondary); margin-bottom: 5px; background: #eee; padding: 6px; border-radius: 4px; }
        .history-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid #f0f0f0; }
        .source-tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; border: 1px solid transparent; }
        .tag-쿠팡 { background: #e3f2fd; color: #1976d2; border-color: #bbdefb; }
        .tag-네이버 { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .tag-수기 { background: #fff3e0; color: #ef6c00; border-color: #ffe0b2; }
        .tag-기타 { background: #f5f5f5; color: #616161; border-color: #e0e0e0; }

        /* 기타 UI 요소 */
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 12px; margin-top: 5px; }
        .action-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
        .action-row input, .action-row select, .action-row button { margin: 0; height: 42px; width: 100%; }
        .check-area { height: 280px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 5px; }
        .chk-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f3f5; }
    </style>
</head>
<body>

<div id="loadingOverlay">☁️ 데이터를 동기화하고 있습니다...</div>

<div class="container">
    <div class="backup-group">
        <div style="margin-right:auto; color:var(--secondary); font-weight:bold;">📅 기준 날짜: <span id="currentDateDisp">-</span></div>
        <button class="btn-backup" onclick="loadFromCloud()">🔄 새로고침</button>
        <button class="btn-backup" onclick="exportData()">💾 로컬 백업</button>
        <button class="btn-backup" onclick="document.getElementById('importFile').click()">📂 백업 복구</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0; border:none;">4. 실시간 재고 및 매출 현황</h3>
                    <input type="text" id="inventorySearch" placeholder="품목명 검색..." oninput="render()" style="width:200px; margin:0;">
                </div>
                <table>
                    <thead>
                        <tr><th>품목명</th><th>단가</th><th>기초</th><th>판매</th><th>현재고</th><th>매출액</th></tr>
                    </thead>
                    <tbody id="mainTable"></tbody>
                </table>
                <div class="summary">
                    당일 매출 합계: <br>
                    <span id="totalSales">0</span>원
                </div>
            </div>

            <div class="card">
                <h3>1. 신규 품목 등록</h3>
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px;">
                    <input type="text" id="mName" placeholder="품목명">
                    <input type="number" id="mPrice" placeholder="단가" value="0">
                    <input type="number" id="mQty" placeholder="기초재고" value="0">
                </div>
                <button class="btn btn-main" onclick="addItem()">품목 리스트 추가</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="card">
                <h3>3. 판매 데이터 적용</h3>
                <div class="action-row">
                    <select id="directItemSelect"></select>
                    <input type="number" id="directQty" value="1" min="1">
                    <button class="btn" style="background:var(--point); color:white;" onclick="applyDirectSale()">수기반영</button>
                </div>
                <div class="action-row">
                    <input type="file" id="exFile" accept=".xlsx, .xls">
                    <button class="btn" style="background:var(--secondary); color:white;" onclick="loadExcel()">엑셀반영</button>
                </div>
            </div>

            <div class="card">
                <h3>2. 플랫폼 상품 매칭 설정</h3>
                <input type="text" id="exName" placeholder="엑셀 상품명 붙여넣기">
                <div id="itemChecks" class="check-area"></div>
                <button class="btn btn-main" style="background: var(--accent);" onclick="addMap()">매치 저장</button>
            </div>

            <div class="card">
                <h3>5. 전체 판매 히스토리</h3>
                <div id="historyContainer" class="history-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Google App Script URL
    const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbPRpVqqrbRUZAmnGpZMP-r3uFCLbhj7YFR5R1QSQQ_PrUiOno-3Jdw_3NCEIZV_4/exec";
    
    let db_master = [], db_map = [], db_history = [];

    function toggleLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'block' : 'none'; }
    function getToday() { return new Date().toISOString().slice(0, 10); }

    // 클라우드 데이터 로드
    async function loadFromCloud() {
        toggleLoading(true);
        try {
            const resp = await fetch(G_SCRIPT_URL);
            const data = await resp.json();
            db_master = data.master || [];
            db_map = data.map || [];
            db_history = data.history || [];
            
            // 날짜 변경 시 재고 이월 로직
            const today = getToday();
            if (data.lastDate && data.lastDate < today) {
                db_master.forEach(i => { i.initial = i.initial - i.sold; i.sold = 0; });
                await saveToCloud();
            }
            document.getElementById('currentDateDisp').innerText = today;
            render();
        } catch (e) { alert("데이터 연동 오류!"); }
        toggleLoading(false);
    }

    // 클라우드 데이터 저장
    async function saveToCloud() {
        toggleLoading(true);
        // history 객체에 source 정보가 포함되어 전송됩니다.
        await fetch(G_SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ 
                action: "save", 
                master: db_master, 
                map: db_map, 
                history: db_history, 
                lastDate: getToday() 
            })
        });
        render();
        toggleLoading(false);
    }

    // 엑셀 분석 및 판매처 자동 분류
    function loadExcel() {
        const fileInput = document.getElementById('exFile');
        const file = fileInput.files[0];
        if(!file) return;

        let source = "기타";
        const fileName = file.name;
        
        if(fileName.includes("DeliveryList")) source = "쿠팡";
        else if(fileName.includes("스마트스토어")) source = "네이버";

        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            rows.forEach(row => {
                const title = row['상품명'] || row['등록상품명'] || row['주문상품명'];
                const qty = parseInt(row['수량'] || row['구매수량']) || 1;
                if(title) {
                    const rule = db_map.find(m => m.exName.trim() === title.trim());
                    if(rule) rule.targets.forEach(tName => { 
                        const item = db_master.find(i => i.name === tName); 
                        if(item) { item.sold += qty; addHistory(tName, qty, source); } 
                    });
                }
            });
            await saveToCloud();
            fileInput.value = "";
        };
        reader.readAsArrayBuffer(file);
    }

    function addHistory(name, qty, source) {
        db_history.push({ date: getToday(), name: name, qty: qty, source: source });
    }

    // 핵심: 실시간 렌더링 및 매출 합계 계산
    function render() {
        const table = document.getElementById('mainTable');
        const search = document.getElementById('inventorySearch').value.toLowerCase();
        let dayTotalSales = 0; // 합계 변수 초기화

        // 1. 재고 테이블 및 매출 합산
        table.innerHTML = db_master.filter(i => i.name.toLowerCase().includes(search)).map(item => {
            const currentStock = item.initial - item.sold;
            const salesAmount = item.sold * item.price;
            dayTotalSales += salesAmount; // 실시간 합산

            return `
                <tr>
                    <td style="text-align:left"><b>${item.name}</b></td>
                    <td>${item.price.toLocaleString()}</td>
                    <td>${item.initial}</td>
                    <td style="color:var(--point); font-weight:bold;">${item.sold}</td>
                    <td>${currentStock}</td>
                    <td style="color:var(--accent); font-weight:bold;">${salesAmount.toLocaleString()}</td>
                </tr>
            `;
        }).join('');

        // 2. 매출 합계 텍스트 업데이트 (오류 수정 지점)
        document.getElementById('totalSales').innerText = dayTotalSales.toLocaleString();

        // 3. 히스토리 렌더링 (판매처 포함)
        const historyList = document.getElementById('historyContainer');
        const grouped = db_history.reduce((acc, obj) => { 
            acc[obj.date] = acc[obj.date] || {};
            acc[obj.date][obj.name] = acc[obj.date][obj.name] || {};
            let s = obj.source || '수기';
            acc[obj.date][obj.name][s] = (acc[obj.date][obj.name][s] || 0) + obj.qty;
            return acc; 
        }, {});

        let hHtml = "";
        Object.keys(grouped).sort().reverse().forEach(date => {
            hHtml += `<div class="history-day"><div class="history-date">${date}</div>`;
            Object.keys(grouped[date]).forEach(name => {
                let total = 0, tags = "";
                Object.keys(grouped[date][name]).forEach(src => {
                    total += grouped[date][name][src];
                    const cls = `tag-${src}`;
                    tags += `<span class="source-tag ${cls}">${src} ${grouped[date][name][src]}</span> `;
                });
                hHtml += `<div class="history-row"><span>${name}</span><div style="text-align:right"><b>총 ${total}개</b><br>${tags}</div></div>`;
            });
            hHtml += `</div>`;
        });
        historyList.innerHTML = hHtml || "데이터 없음";

        // 품목 선택 UI 업데이트
        document.getElementById('directItemSelect').innerHTML = db_master.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        const sortedItems = [...db_master].sort((a,b) => a.name.localeCompare(b.name, 'ko'));
        document.getElementById('itemChecks').innerHTML = sortedItems.map(i => `
            <label class="chk-item"><span>${i.name}</span><input type="checkbox" class="chk" value="${i.name}"></label>
        `).join('');
    }

    async function addItem() {
        const name = document.getElementById('mName').value.trim();
        if(!name) return;
        db_master.push({ name, price: parseInt(document.getElementById('mPrice').value)||0, initial: parseInt(document.getElementById('mQty').value)||0, sold: 0 });
        await saveToCloud();
        document.getElementById('mName').value = "";
    }

    async function applyDirectSale() {
        const name = document.getElementById('directItemSelect').value;
        const qty = parseInt(document.getElementById('directQty').value) || 0;
        const item = db_master.find(i => i.name === name);
        if(item) { item.sold += qty; addHistory(name, qty, "수기"); await saveToCloud(); }
    }

    async function addMap() {
        const exName = document.getElementById('exName').value.trim();
        const targets = Array.from(document.querySelectorAll('.chk:checked')).map(c => c.value);
        if(!exName || targets.length === 0) return;
        db_map.push({ exName, targets });
        await saveToCloud();
        document.getElementById('exName').value = "";
    }

    loadFromCloud();
</script>
</body>
</html>
